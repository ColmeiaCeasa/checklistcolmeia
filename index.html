<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Check-List de Veículos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <style>
    body { background-color: #f4f7f6; padding: 20px; }
    .card { border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .item-inspecao { border-bottom: 1px solid #dee2e6; padding-bottom: 12px; margin-bottom: 12px; }
    .foto-input { display: none; margin-top: 8px; }
    .obs-input { margin-top: 8px; font-size: 14px; background-color: #fcfcfc; }
    .resumo-revisao p { margin-bottom: 5px; }
    
    @media print {
      body { background-color: white !important; padding: 0; }
      .card { box-shadow: none !important; border: none !important; padding: 0 !important; }
      #checklistForm, #tituloForm, #logoForm, #areaBotoesPrincipal, .modal { display: none !important; }
      #areaImpressao { display: block !important; }
      .d-print-none { display: none !important; }
    }
  </style>
</head>
<body>

<div class="container" id="conteudo-pdf">
  <div class="card p-4">
    
    <div class="text-center mb-3" id="logoForm">
      <img src="logo.png" alt="Logo da Empresa" style="max-height: 90px; width: auto;" onerror="this.style.display='none'">
    </div>

    <h3 class="text-center mb-4 text-primary" id="tituloForm">CHECK-LIST DIÁRIO</h3>
    
    <form id="checklistForm">
      <div class="mb-3">
        <label class="form-label fw-bold">Data e Horário</label>
        <input type="text" id="dataHora" class="form-control" readonly>
      </div>

      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label fw-bold">Motorista</label>
          <select id="motorista" class="form-select" required><option value="">Carregando...</option></select>
        </div>
        <div class="col-md-6 mb-3">
          <label class="form-label fw-bold">Modelo do Veículo</label>
          <select id="veiculo" class="form-select" onchange="preencherPlaca()" required><option value="">Carregando...</option></select>
        </div>
        <div class="col-md-4 mb-3">
          <label class="form-label fw-bold">Placa</label>
          <input type="text" id="placa" class="form-control" placeholder="Automático ou digite..." required>
        </div>
        <div class="col-md-4 mb-3">
          <label class="form-label fw-bold">Kilometragem Atual</label>
          <input type="number" id="km" class="form-control" placeholder="Ex: 15000" required>
        </div>
        <div class="col-md-4 mb-3">
          <label class="form-label fw-bold">Data da Última Revisão</label>
          <input type="date" id="dataRevisao" class="form-control" required>
        </div>
      </div>

      <h5 class="mt-4 mb-3 text-secondary border-bottom pb-2">Itens Inspecionados</h5>
      <div id="listaItens">
        <p class="text-muted" id="statusCarregamento">Carregando itens da planilha...</p>
      </div>

      <div class="d-grid gap-2 mt-4" id="areaBotoesPrincipal">
        <button type="button" class="btn btn-warning btn-lg fw-bold text-dark" onclick="abrirRevisao()">Revisar e Enviar</button>
      </div>
    </form>

    <div id="areaImpressao" style="display: none;"></div>

  </div>
</div>

<div class="modal fade" id="modalRevisao" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header bg-warning">
        <h5 class="modal-title fw-bold">Revisar Informações</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body resumo-revisao" id="conteudoRevisao">
      </div>
      <div class="modal-footer d-flex justify-content-between">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Voltar e Editar</button>
        <button type="button" class="btn btn-success fw-bold" onclick="confirmarEnvio()" id="btnConfirmar">Confirmar e Salvar</button>
      </div>
    </div>
  </div>
</div>

<script>
  // A URL DA SUA PLANILHA CONTINUA A MESMA
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz9x_swESJO1GvXhXFJSUqBXl0lTQbua_r1ODTK3gLnXGQyTdjemk6zIr48YLVQhkQE/exec';

  let dadosFormularioAtual = {}; 
  let modalRevisao; 
  let mapaVeiculoPlaca = {}; 

  document.addEventListener("DOMContentLoaded", function() {
    document.getElementById('dataHora').value = new Date().toLocaleString('pt-BR');
    modalRevisao = new bootstrap.Modal(document.getElementById('modalRevisao'));
    carregarDadosBase();
  });

  function carregarDadosBase() {
    fetch(APPS_SCRIPT_URL)
      .then(response => response.json())
      .then(dados => popularFormulario(dados))
      .catch(erro => {
        document.getElementById('statusCarregamento').innerText = "Erro ao carregar dados da planilha.";
        console.error(erro);
      });
  }

  function popularFormulario(dados) {
    const preencherSelect = (id, array) => {
      const select = document.getElementById(id);
      select.innerHTML = '<option value="">Selecione...</option>';
      array.forEach(item => {
        select.innerHTML += `<option value="${item}">${item}</option>`;
      });
    };

    preencherSelect('motorista', dados.motoristas);
    preencherSelect('veiculo', dados.veiculos);
    
    dados.veiculos.forEach((veiculo, index) => {
      if (veiculo && dados.placas[index]) {
        mapaVeiculoPlaca[veiculo] = dados.placas[index];
      }
    });

    const listaItens = document.getElementById('listaItens');
    listaItens.innerHTML = '';
    dados.itens.forEach((item, index) => {
      // INTERFACE ATUALIZADA COM BOTÕES SEPARADOS E DE TAMANHOS IGUAIS
      listaItens.innerHTML += `
        <div class="item-inspecao" id="item_${index}">
          <div class="d-flex justify-content-between align-items-center mb-2">
            <p class="fw-bold mb-0" style="flex: 1; padding-right: 10px;">${item}</p>
            
            <div class="d-flex gap-2">
              <input type="radio" class="btn-check" name="status_${index}" id="btn-ok-${index}" value="OK" onchange="toggleFoto(${index}, false)" autocomplete="off">
              <label class="btn btn-outline-success btn-sm fw-bold" style="width: 90px; text-align: center;" for="btn-ok-${index}">OK</label>

              <input type="radio" class="btn-check" name="status_${index}" id="btn-nok-${index}" value="NÃO OK" onchange="toggleFoto(${index}, true)" autocomplete="off">
              <label class="btn btn-outline-danger btn-sm fw-bold" style="width: 90px; text-align: center;" for="btn-nok-${index}">NÃO OK</label>
            </div>
          </div>

          <input type="text" class="form-control obs-input" id="obs_${index}" placeholder="Adicionar observação (opcional)">
          <input type="file" class="form-control foto-input" id="foto_${index}" accept="image/*" capture="environment">
        </div>
      `;
    });
  }

  function preencherPlaca() {
    const veiculoSelecionado = document.getElementById('veiculo').value;
    const campoPlaca = document.getElementById('placa');
    if (mapaVeiculoPlaca[veiculoSelecionado]) {
      campoPlaca.value = mapaVeiculoPlaca[veiculoSelecionado];
    } else {
      campoPlaca.value = ''; 
    }
  }

  function toggleFoto(index, isNaoOk) {
    const inputFoto = document.getElementById(`foto_${index}`);
    if (isNaoOk) {
      inputFoto.style.display = 'block';
    } else {
      inputFoto.style.display = 'none';
      inputFoto.value = ''; 
    }
  }

  function abrirRevisao() {
    const motorista = document.getElementById('motorista').value;
    const veiculo = document.getElementById('veiculo').value;
    const placa = document.getElementById('placa').value;
    const km_puro = document.getElementById('km').value;
    const dataRevisao = document.getElementById('dataRevisao').value;

    if(!motorista || !veiculo || !placa || !km_puro || !dataRevisao) {
      alert("Por favor, preencha todos os dados principais (incluindo KM e Data da Revisão)!");
      return;
    }

    const dataRevFormatada = dataRevisao.split('-').reverse().join('/');

    dadosFormularioAtual = {
      dataHora: document.getElementById('dataHora').value,
      motorista: motorista,
      veiculo: veiculo,
      placa: placa,
      km: `${km_puro} (Revisão: ${dataRevFormatada})`, 
      km_puro: km_puro,
      dataRevFormatada: dataRevFormatada,
      respostas: []
    };

    let htmlRevisao = `
      <p><strong>Data/Hora:</strong> ${dadosFormularioAtual.dataHora}</p>
      <p><strong>Motorista:</strong> ${dadosFormularioAtual.motorista}</p>
      <p><strong>Veículo:</strong> ${dadosFormularioAtual.veiculo} (Placa: ${dadosFormularioAtual.placa})</p>
      <p><strong>KM:</strong> ${dadosFormularioAtual.km_puro} &nbsp;|&nbsp; <strong>Última Rev:</strong> ${dadosFormularioAtual.dataRevFormatada}</p>
      <hr>
      <h6 class="fw-bold">Itens Inspecionados:</h6>
      <ul class="list-group list-group-flush mb-3">
    `;

    const itensDiv = document.querySelectorAll('.item-inspecao');
    let todosRespondidos = true;

    itensDiv.forEach((div, index) => {
      const nomeItem = div.querySelector('p').innerText;
      // O seletor de input rádio continua funcionando da mesma forma por trás dos panos
      const statusCheck = div.querySelector(`input[name="status_${index}"]:checked`);
      const obs = document.getElementById(`obs_${index}`).value.trim();
      
      if(statusCheck) {
        let statusPlanilha = statusCheck.value;
        if(obs !== "") statusPlanilha += ` (Obs: ${obs})`;

        dadosFormularioAtual.respostas.push({ 
          item: nomeItem, 
          status: statusPlanilha, 
          status_puro: statusCheck.value,
          obs_pura: obs 
        });
        
        let cor = statusCheck.value === 'OK' ? 'text-success' : 'text-danger fw-bold';
        
        let htmlItem = `<li class="list-group-item py-1">${nomeItem}: <span class="${cor}">${statusCheck.value}</span>`;
        if (obs !== "") {
          htmlItem += `<br><small class="text-muted fst-italic">Obs: ${obs}</small>`;
        }
        htmlItem += `</li>`;
        
        htmlRevisao += htmlItem;
      } else {
        todosRespondidos = false;
      }
    });

    htmlRevisao += `</ul>`;

    if(!todosRespondidos) {
      alert("Atenção: Você não marcou OK ou NÃO OK em todos os itens da lista.");
      return;
    }

    document.getElementById('conteudoRevisao').innerHTML = htmlRevisao;
    modalRevisao.show();
  }

  function confirmarEnvio() {
    const btn = document.getElementById('btnConfirmar');
    btn.innerText = 'Salvando e preparando PDF...';
    btn.disabled = true;

    fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify(dadosFormularioAtual),
      redirect: "follow",
      headers: {
        'Content-Type': 'text/plain;charset=utf-8',
      }
    })
    .then(response => {
      modalRevisao.hide();
      document.getElementById('modalRevisao').addEventListener('hidden.bs.modal', function onModalHidden() {
        gerarTelaRelatorio();
        document.getElementById('modalRevisao').removeEventListener('hidden.bs.modal', onModalHidden);
      });
    })
    .catch(erro => {
      console.error(erro);
      modalRevisao.hide();
      setTimeout(gerarTelaRelatorio, 600); 
    });
  }

  function gerarTelaRelatorio() {
    const areaImpressao = document.getElementById('areaImpressao');
    const form = document.getElementById('checklistForm');
    const titulo = document.getElementById('tituloForm');
    const logo = document.getElementById('logoForm');
    
    let htmlImpressao = `
      <div style="text-align: center; margin-bottom: 15px;">
        <img src="logo.png" alt="Logo da Empresa" style="max-height: 80px; width: auto;" onerror="this.style.display='none'">
      </div>
      <h3 style="text-align: center; color: #0d6efd; margin-bottom: 20px;">RELATÓRIO DE INSPEÇÃO DIÁRIA</h3>
      <div style="font-size: 16px;">
        ${document.getElementById('conteudoRevisao').innerHTML}
      </div>
      <hr>
      <h6 style="margin-top: 20px; font-weight: bold;">Registros Fotográficos (NÃO OK):</h6>
      <div id="fotosImpressao" style="margin-top: 15px;"></div>
      
      <div class="d-grid gap-2 mt-5 d-print-none border-top pt-4">
        <button class="btn btn-success btn-lg" onclick="abrirWhatsApp()">📲 1. Enviar Relatório no WhatsApp</button>
        <button class="btn btn-secondary" onclick="voltarParaNovoPreenchimento()">🔄 2. Limpar e Fazer Nova Inspeção</button>
      </div>
    `;
    
    areaImpressao.innerHTML = htmlImpressao;
    const containerFotos = document.getElementById('fotosImpressao');
    const inputsFoto = document.querySelectorAll('.foto-input');
    let qtdeFotos = 0;

    inputsFoto.forEach((input, index) => {
      if (input.files && input.files[0]) {
        qtdeFotos++;
        const nomeItem = document.querySelectorAll('.item-inspecao')[index].querySelector('p').innerText;
        const obsItem = document.getElementById(`obs_${index}`).value.trim();
        
        let divFoto = document.createElement('div');
        divFoto.style.marginBottom = '20px';
        
        let infoFoto = `<p style="font-weight: bold; margin-bottom: 2px; color: #dc3545;">Item: ${nomeItem}</p>`;
        if(obsItem !== "") {
          infoFoto += `<p style="font-size: 14px; margin-bottom: 5px; color: #555;">Obs: ${obsItem}</p>`;
        }
        divFoto.innerHTML = infoFoto;
        
        let imgDOM = document.createElement('img');
        imgDOM.src = URL.createObjectURL(input.files[0]);
        imgDOM.style.maxWidth = '100%';
        imgDOM.style.maxHeight = '350px';
        imgDOM.style.borderRadius = '5px';
        imgDOM.style.border = '1px solid #ccc';
        
        divFoto.appendChild(imgDOM);
        containerFotos.appendChild(divFoto);
      }
    });

    if(qtdeFotos === 0) {
      containerFotos.innerHTML = "<p>Nenhuma foto anexada neste relatório.</p>";
    }

    form.style.display = 'none';
    titulo.style.display = 'none';
    logo.style.display = 'none'; 
    areaImpressao.style.display = 'block';

    setTimeout(() => {
      window.print(); 
    }, 1000); 
  }

  function abrirWhatsApp() {
    const mensagem = `Olá! Segue o checklist diário preenchido.\n*Veículo:* ${dadosFormularioAtual.veiculo}\n*Placa:* ${dadosFormularioAtual.placa}\n*Motorista:* ${dadosFormularioAtual.motorista}\n*Última Rev:* ${dadosFormularioAtual.dataRevFormatada}`;
    const zapUrl = `https://api.whatsapp.com/send?text=${encodeURIComponent(mensagem)}`;
    window.open(zapUrl, '_blank');
  }

  function voltarParaNovoPreenchimento() {
    document.getElementById('areaImpressao').style.display = 'none';
    document.getElementById('areaImpressao').innerHTML = '';
    
    document.getElementById('checklistForm').style.display = 'block';
    document.getElementById('tituloForm').style.display = 'block';
    document.getElementById('logoForm').style.display = 'block'; 
    
    document.getElementById('checklistForm').reset();
    document.getElementById('dataHora').value = new Date().toLocaleString('pt-BR');
    
    const btn = document.getElementById('btnConfirmar');
    btn.innerText = 'Confirmar e Salvar';
    btn.disabled = false;
  }
</script>
</body>
</html>
