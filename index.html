<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Check-List de Veículos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    body { background-color: #f4f7f6; padding: 20px; }
    .card { border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .item-inspecao { border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 10px; }
    .foto-input { display: none; margin-top: 10px; }
    .resumo-revisao p { margin-bottom: 5px; }
    .foto-temporaria-pdf {
      display: block;
      max-width: 100%;
      max-height: 250px;
      margin-top: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }
  </style>
</head>
<body>

<div class="container" id="conteudo-pdf">
  <div class="card p-4">
    <h3 class="text-center mb-4 text-primary">CHECK-LIST DIÁRIO</h3>
    
    <form id="checklistForm">
      <div class="mb-3">
        <label class="form-label fw-bold">Data e Horário</label>
        <input type="text" id="dataHora" class="form-control" readonly>
      </div>

      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label fw-bold">Motorista</label>
          <select id="motorista" class="form-select" required><option value="">Carregando...</option></select>
        </div>
        <div class="col-md-6 mb-3">
          <label class="form-label fw-bold">Modelo do Veículo</label>
          <select id="veiculo" class="form-select" required><option value="">Carregando...</option></select>
        </div>
        <div class="col-md-6 mb-3">
          <label class="form-label fw-bold">Placa</label>
          <select id="placa" class="form-select" required><option value="">Carregando...</option></select>
        </div>
        <div class="col-md-6 mb-3">
          <label class="form-label fw-bold">Kilometragem Atual</label>
          <input type="number" id="km" class="form-control" placeholder="Ex: 15000" required>
        </div>
      </div>

      <h5 class="mt-4 mb-3 text-secondary border-bottom pb-2">Itens Inspecionados</h5>
      <div id="listaItens">
        <p class="text-muted" id="statusCarregamento">Carregando itens da planilha...</p>
      </div>

      <div class="d-grid gap-2 mt-4">
        <button type="button" class="btn btn-warning btn-lg fw-bold text-dark" onclick="abrirRevisao()">Revisar e Enviar</button>
      </div>
    </form>
  </div>
</div>

<div class="modal fade" id="modalRevisao" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header bg-warning">
        <h5 class="modal-title fw-bold">Revisar Informações</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body resumo-revisao" id="conteudoRevisao">
      </div>
      <div class="modal-footer d-flex justify-content-between">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Voltar e Editar</button>
        <button type="button" class="btn btn-success fw-bold" onclick="confirmarEnvio()" id="btnConfirmar">Confirmar e Salvar</button>
      </div>
    </div>
  </div>
</div>

<script>
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz9x_swESJO1GvXhXFJSUqBXl0lTQbua_r1ODTK3gLnXGQyTdjemk6zIr48YLVQhkQE/exec';

  let dadosFormularioAtual = {}; 
  let modalRevisao; 

  document.addEventListener("DOMContentLoaded", function() {
    document.getElementById('dataHora').value = new Date().toLocaleString('pt-BR');
    modalRevisao = new bootstrap.Modal(document.getElementById('modalRevisao'));
    carregarDadosBase();
  });

  function carregarDadosBase() {
    fetch(APPS_SCRIPT_URL)
      .then(response => response.json())
      .then(dados => popularFormulario(dados))
      .catch(erro => {
        document.getElementById('statusCarregamento').innerText = "Erro ao carregar dados da planilha.";
        console.error(erro);
      });
  }

  function popularFormulario(dados) {
    const preencherSelect = (id, array) => {
      const select = document.getElementById(id);
      select.innerHTML = '<option value="">Selecione...</option>';
      array.forEach(item => {
        select.innerHTML += `<option value="${item}">${item}</option>`;
      });
    };

    preencherSelect('motorista', dados.motoristas);
    preencherSelect('veiculo', dados.veiculos);
    preencherSelect('placa', dados.placas);

    const listaItens = document.getElementById('listaItens');
    listaItens.innerHTML = '';
    dados.itens.forEach((item, index) => {
      listaItens.innerHTML += `
        <div class="item-inspecao" id="item_${index}">
          <p class="fw-bold mb-1">${item}</p>
          <div class="form-check form-check-inline">
            <input class="form-check-input" type="radio" name="status_${index}" value="OK" onchange="toggleFoto(${index}, false)">
            <label class="form-check-label text-success">OK</label>
          </div>
          <div class="form-check form-check-inline">
            <input class="form-check-input" type="radio" name="status_${index}" value="NÃO OK" onchange="toggleFoto(${index}, true)">
            <label class="form-check-label text-danger">NÃO OK</label>
          </div>
          <input type="file" class="form-control foto-input" id="foto_${index}" accept="image/*" capture="environment">
        </div>
      `;
    });
  }

  function toggleFoto(index, isNaoOk) {
    const inputFoto = document.getElementById(`foto_${index}`);
    if (isNaoOk) {
      inputFoto.style.display = 'block';
    } else {
      inputFoto.style.display = 'none';
      inputFoto.value = ''; 
    }
  }

  function abrirRevisao() {
    const motorista = document.getElementById('motorista').value;
    const veiculo = document.getElementById('veiculo').value;
    const placa = document.getElementById('placa').value;
    const km = document.getElementById('km').value;

    if(!motorista || !veiculo || !placa || !km) {
      alert("Por favor, preencha todos os dados principais do veículo e motorista!");
      return;
    }

    dadosFormularioAtual = {
      dataHora: document.getElementById('dataHora').value,
      motorista: motorista,
      veiculo: veiculo,
      placa: placa,
      km: km,
      respostas: []
    };

    let htmlRevisao = `
      <p><strong>Data/Hora:</strong> ${dadosFormularioAtual.dataHora}</p>
      <p><strong>Motorista:</strong> ${dadosFormularioAtual.motorista}</p>
      <p><strong>Veículo:</strong> ${dadosFormularioAtual.veiculo} (Placa: ${dadosFormularioAtual.placa})</p>
      <p><strong>KM:</strong> ${dadosFormularioAtual.km}</p>
      <hr>
      <h6 class="fw-bold">Itens:</h6>
      <ul class="list-group list-group-flush mb-3">
    `;

    const itensDiv = document.querySelectorAll('.item-inspecao');
    let todosRespondidos = true;

    itensDiv.forEach((div, index) => {
      const nomeItem = div.querySelector('p').innerText;
      const statusCheck = div.querySelector(`input[name="status_${index}"]:checked`);
      
      if(statusCheck) {
        dadosFormularioAtual.respostas.push({ item: nomeItem, status: statusCheck.value });
        let cor = statusCheck.value === 'OK' ? 'text-success' : 'text-danger fw-bold';
        htmlRevisao += `<li class="list-group-item py-1">${nomeItem}: <span class="${cor}">${statusCheck.value}</span></li>`;
      } else {
        todosRespondidos = false;
      }
    });

    htmlRevisao += `</ul>`;

    if(!todosRespondidos) {
      alert("Atenção: Você não marcou OK ou NÃO OK em todos os itens da lista.");
      return;
    }

    document.getElementById('conteudoRevisao').innerHTML = htmlRevisao;
    modalRevisao.show();
  }

  function confirmarEnvio() {
    const btn = document.getElementById('btnConfirmar');
    btn.innerText = 'Processando e Salvando...';
    btn.disabled = true;

    fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify(dadosFormularioAtual),
      redirect: "follow",
      headers: {
        'Content-Type': 'text/plain;charset=utf-8',
      }
    })
    .then(response => {
      modalRevisao.hide();
      setTimeout(gerarECompartilharPDF, 500); 
    })
    .catch(erro => {
      console.error(erro);
      modalRevisao.hide();
      setTimeout(gerarECompartilharPDF, 500); 
    });
  }

  function gerarECompartilharPDF() {
    const areaBotoes = document.querySelector('.d-grid');
    const inputsFoto = document.querySelectorAll('.foto-input');
    const btn = document.getElementById('btnConfirmar');
    
    areaBotoes.style.display = 'none';
    
    let promessasImagens = [];

    inputsFoto.forEach(input => {
      input.style.display = 'none';

      if (input.files && input.files[0]) {
        let promessa = new Promise((resolve, reject) => {
          let reader = new FileReader();
          
          reader.onload = function(e) {
            let imgObj = new Image();
            
            imgObj.onload = function() {
              // TRUQUE DO CANVAS: Desenha a imagem para forçar um JPEG limpo e leve
              let canvas = document.createElement('canvas');
              let ctx = canvas.getContext('2d');
              
              // Reduz o tamanho máximo para 800px para não travar a memória do celular
              let MAX_WIDTH = 800;
              let scaleSize = MAX_WIDTH / imgObj.width;
              
              if(imgObj.width > MAX_WIDTH) {
                canvas.width = MAX_WIDTH;
                canvas.height = imgObj.height * scaleSize;
              } else {
                canvas.width = imgObj.width;
                canvas.height = imgObj.height;
              }
              
              ctx.drawImage(imgObj, 0, 0, canvas.width, canvas.height);
              
              // Extrai um JPEG padrão de web garantido
              let imagemLimpaUrl = canvas.toDataURL('image/jpeg', 0.8);
              
              // Cria a imagem na tela para o PDF ler
              let imgDOM = document.createElement('img');
              imgDOM.src = imagemLimpaUrl;
              imgDOM.classList.add('foto-temporaria-pdf');
              input.parentNode.appendChild(imgDOM);
              
              // Dá um tempinho mínimo para o HTML atualizar
              setTimeout(resolve, 100);
            };
            
            imgObj.onerror = function() {
              reject("Falha ao desenhar a imagem.");
            };
            
            imgObj.src = e.target.result;
          };
          
          reader.onerror = reject;
          reader.readAsDataURL(input.files[0]); 
        });
        promessasImagens.push(promessa);
      }
    });

    // Espera todas as imagens serem processadas pelo Canvas
    Promise.all(promessasImagens).then(() => {
      
      const elemento = document.getElementById('conteudo-pdf');
      const placa = dadosFormularioAtual.placa || 'Veiculo';
      const opt = {
        margin:       10,
        filename:     `Checklist-${placa}.pdf`,
        image:        { type: 'jpeg', quality: 0.98 },
        html2canvas:  { scale: 2, useCORS: true },
        jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
      };

      html2pdf().set(opt).from(elemento).save().then(() => {
        
        document.querySelectorAll('.foto-temporaria-pdf').forEach(img => img.remove());
        document.getElementById('checklistForm').reset();
        document.getElementById('dataHora').value = new Date().toLocaleString('pt-BR');
        
        areaBotoes.style.display = 'block'; 
        btn.innerText = 'Confirmar e Salvar';
        btn.disabled = false;

        setTimeout(() => {
          const mensagem = `Olá! Segue o checklist diário preenchido.\n*Veículo:* ${dadosFormularioAtual.veiculo}\n*Placa:* ${dadosFormularioAtual.placa}\n*Motorista:* ${dadosFormularioAtual.motorista}`;
          const zapUrl = `https://api.whatsapp.com/send?text=${encodeURIComponent(mensagem)}`;
          
          if(confirm("✅ PDF com fotos gerado e baixado com sucesso!\n\nDeseja abrir o WhatsApp agora para anexar e enviar o arquivo?")) {
            window.open(zapUrl, '_blank');
          }
        }, 1000);

      }).catch(erro => {
        alert("Houve um erro ao gerar o PDF: " + erro);
        restaurarTela(areaBotoes, btn);
      });

    }).catch(erro => {
      alert("Erro ao processar as fotos: " + erro);
      restaurarTela(areaBotoes, btn);
    });
  }

  function restaurarTela(areaBotoes, btn) {
    document.querySelectorAll('.foto-temporaria-pdf').forEach(img => img.remove());
    areaBotoes.style.display = 'block';
    btn.innerText = 'Confirmar e Salvar';
    btn.disabled = false;
  }
</script>
</body>
</html>
